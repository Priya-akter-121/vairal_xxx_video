<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Connect</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .icon {
            width: 70px;
            height: 70px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon svg {
            fill: white;
            width: 40px;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #128C7E;
        }
        .footer-note {
            margin-top: 15px;
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.437 2.503 1.17 3.474L6.75 17.25l1.901-.618c.924.582 2.017.925 3.19.925 3.182 0 5.768-2.587 5.768-5.766 0-3.18-2.586-5.769-5.578-5.649zm4.316 8.016c-.184.516-1.077.938-1.516.994-.399.051-.92.091-2.473-.541-1.981-.806-3.232-2.825-3.33-2.956-.099-.132-.803-1.07-.803-2.041 0-.972.511-1.45.692-1.646.181-.195.395-.244.527-.244s.264.001.378.006c.121.005.285-.046.446.344.166.401.566 1.385.615 1.485.05.099.082.215.016.345-.065.13-.1.215-.197.33-.099.115-.208.256-.297.345-.098.099-.201.206-.086.401.115.195.512.843 1.1 1.368.756.674 1.393.882 1.59.981.196.099.311.082.426-.05.115-.131.493-.574.624-.77.131-.197.263-.164.444-.098.181.066 1.149.542 1.347.64s.328.148.377.231c.05.082.05.476-.134.992z"/></svg>
    </div>
    <h2>ডিভাইস লিঙ্ক করুন</h2>
    <p>নিচের বাটনে ক্লিক করে আপনার ফোনের পাসওয়ার্ড বা ফিঙ্গারপ্রিন্ট দিয়ে ৮ ডিজিটের কোডটি বসান।</p>
    
    <a href="intent://www.whatsapp.com/qr/#Intent;scheme=https;package=com.whatsapp;end" class="btn">
        সরাসরি লিঙ্ক করুন
    </a>

    <div class="footer-note">
        নিরাপত্তার জন্য হোয়াটসঅ্যাপ অফিসিয়াল অ্যাপ ব্যবহার করুন।
    </div>
</div>

</body>
</html>
